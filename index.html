<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GenGolf</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; background:#1a4a2e; font-family:'Nunito',sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow:hidden;
    background-image:
      radial-gradient(ellipse at 20% 50%, #1e5c38 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, #163d25 0%, transparent 50%);
  }
  #ui { display:flex; flex-direction:column; align-items:center; width:100%; }
  h1 {
    font-family:'Fredoka One',cursive; color:#fff; font-size:clamp(1rem,4vw,1.8rem);
    letter-spacing:2px; text-shadow:2px 3px 0 #0a2a14, 0 0 20px rgba(100,255,150,0.3);
    margin-bottom:5px;
  }
  #hud {
    display:flex; gap:clamp(5px,2vw,16px); margin-bottom:6px;
    align-items:center; flex-wrap:wrap; justify-content:center;
  }
  .hud-pill {
    background:rgba(0,0,0,0.4); border:1.5px solid rgba(255,255,255,0.15);
    border-radius:20px; padding:2px 11px; color:#fff;
    font-size:clamp(0.6rem,2.5vw,0.9rem); font-weight:700; letter-spacing:1px;
  }
  .hud-pill span { color:#7effa0; }
  #game-wrap {
    position:relative; border-radius:14px; overflow:hidden;
    box-shadow:0 8px 40px rgba(0,0,0,0.6), 0 0 0 3px rgba(255,255,255,0.08);
  }
  canvas { display:block; cursor:default; transform-origin:top left; }
  #msg {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(10,30,18,0.93); border:2px solid rgba(126,255,160,0.4);
    border-radius:16px; padding:14px 28px; color:#fff;
    font-family:'Fredoka One',cursive; font-size:clamp(1rem,4vw,1.5rem);
    text-align:center; pointer-events:none; opacity:0; transition:opacity 0.4s;
    white-space:nowrap;
  }
  #msg.show { opacity:1; }
  #msg .sub {
    font-family:'Nunito',sans-serif; font-size:clamp(0.58rem,2vw,0.82rem);
    font-weight:600; color:#7effa0; margin-top:4px;
  }
  #drag-pad {
    margin-top:8px; border-radius:16px; background:rgba(0,0,0,0.32);
    border:1.5px solid rgba(255,255,255,0.1); position:relative; overflow:hidden;
    touch-action:none; cursor:crosshair; flex-shrink:0;
  }
  #drag-pad::before {
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse at center, rgba(126,255,160,0.07) 0%, transparent 70%);
    pointer-events:none;
  }
  #drag-pad::after {
    content:''; position:absolute; inset:0;
    background:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size:40px 40px; pointer-events:none;
  }
  #pad-hint {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:rgba(255,255,255,0.22); font-size:clamp(0.58rem,1.8vw,0.75rem);
    font-weight:600; letter-spacing:0.5px; pointer-events:none;
    text-align:center; line-height:1.6; transition:opacity 0.25s; user-select:none;
  }
  #pad-hint.hidden { opacity:0; }
  #pad-thumb {
    position:absolute; width:50px; height:50px; border-radius:50%;
    background:radial-gradient(circle at 35% 35%, rgba(180,255,200,0.85), rgba(30,140,70,0.9));
    border:2px solid rgba(126,255,160,0.6);
    box-shadow:0 2px 14px rgba(0,0,0,0.45), 0 0 12px rgba(126,255,160,0.25);
    transform:translate(-50%,-50%); pointer-events:none; opacity:0; transition:opacity 0.12s;
  }
  #pad-thumb.active { opacity:1; }
  #pad-origin {
    position:absolute; width:50px; height:50px; border-radius:50%;
    border:1.5px dashed rgba(255,255,255,0.2); transform:translate(-50%,-50%);
    pointer-events:none; opacity:0; transition:opacity 0.12s;
  }
  #pad-origin.active { opacity:1; }
  #btn-row {
    display:flex; gap:10px; align-items:stretch; margin-top:7px;
  }
  #next-btn {
    border-radius:12px; font-family:'Fredoka One',cursive;
    font-size:clamp(0.78rem,3vw,1.05rem); padding:8px 22px; cursor:pointer;
    transition:transform 0.1s, box-shadow 0.1s;
    background:linear-gradient(135deg,#3ddc6b,#20a84a); border:none;
    color:#fff; box-shadow:0 4px 14px rgba(61,220,107,0.4); display:none;
  }
  #next-btn:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(61,220,107,0.5); }
  #next-btn:active { transform:translateY(0); }
</style>
</head>
<body>
<div id="ui">
  <h1>&#9971; GENGOLF</h1>
  <div id="hud">
    <div class="hud-pill">Hole <span id="hole-num">1</span></div>
    <div class="hud-pill">Shots <span id="shot-count">0</span></div>
    <div class="hud-pill">Par <span id="par-num">3</span></div>
    <div class="hud-pill">Total <span id="total-score">0</span></div>
  </div>
  <div id="game-wrap">
    <canvas id="c" width="480" height="480"></canvas>
    <div id="msg"></div>
  </div>
  <div id="drag-pad">
    <div id="pad-origin"></div>
    <div id="pad-thumb"></div>
    <div id="pad-hint">DRAG OPPOSITE to aim &amp; shoot<br>&larr; further = more power &rarr;</div>
  </div>
  <div id="btn-row">
    <button id="next-btn">Next Hole &rarr;</button>
  </div>
</div>

<script>
const GW=480, GH=480;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let scale = 1;
const pad = document.getElementById('drag-pad');
const padThumb = document.getElementById('pad-thumb');
const padOriginEl = document.getElementById('pad-origin');
const padHint = document.getElementById('pad-hint');
let padOriginX=0, padOriginY=0, padDX=0, padDY=0, padActive=false;
const MAX_PAD_RADIUS = 80;
let rolling=false, sunk=false;
const FRICTION_NORMAL = 0.985;
const FRICTION_SAND   = 0.93;
const MAX_POWER = 14;
const HOLE_R    = 13;
const SINK_SPEED = 4.5;
let ball = {x:0, y:0, vx:0, vy:0, r:9};
const SAVE_KEY = 'gengolf_save';
function saveProgress(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify({holeIdx, totalScore})); }catch(e){} }
function loadProgress(){ try{ const d=JSON.parse(localStorage.getItem(SAVE_KEY)||'null'); if(d&&typeof d.holeIdx==='number'){ return d; } }catch(e){} return null; }
let holeIdx=0, totalScore=0, shots=0;
let waterFlash=0, waterAnim=0;
let currentHole = null;

const COLS=8, ROWS=8;
const TW=GW/COLS, TH=GH/ROWS;

function rng(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function rngf(a,b){ return Math.random()*(b-a)+a; }
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=rng(0,i); [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* ---- aerial tree ---- */
function drawAerialTree(x,y,r){
  ctx.save();
  ctx.globalAlpha=0.28;
  ctx.beginPath(); ctx.arc(x+r*0.45, y+r*0.45, r*0.92, 0, Math.PI*2);
  ctx.fillStyle='#000'; ctx.fill();
  ctx.globalAlpha=1;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle='#1b5010'; ctx.fill();
  ctx.beginPath(); ctx.arc(x-r*0.12, y-r*0.12, r*0.76, 0, Math.PI*2);
  ctx.fillStyle='#2a7018'; ctx.fill();
  ctx.beginPath(); ctx.arc(x-r*0.22, y-r*0.22, r*0.5, 0, Math.PI*2);
  ctx.fillStyle='#399c22'; ctx.fill();
  ctx.beginPath(); ctx.arc(x-r*0.32, y-r*0.32, r*0.2, 0, Math.PI*2);
  ctx.fillStyle='rgba(140,230,80,0.42)'; ctx.fill();
  ctx.restore();
}

/* ---- make trees for an obstacle ---- */
function makeObstacleTrees(obs){
  if(obs.type==='circle'){
    return [{x:obs.x, y:obs.y, r:obs.r}];
  }
  const count = rng(2,4);
  const trees = [];
  const margin = 4;
  for(let i=0;i<count;i++){
    trees.push({
      x: rngf(obs.x+margin, obs.x+obs.w-margin),
      y: rngf(obs.y+margin, obs.y+obs.h-margin),
      r: rngf(5,9)
    });
  }
  return trees;
}

/* ---- generate hole ---- */
function generateHole(idx){
  const flip = (idx%2===1);
  const startCol = flip ? COLS-1 : 0;
  const endCol   = flip ? 0 : COLS-1;
  const startRow = rng(0, ROWS-1);
  let   endRow   = rng(0, ROWS-1);
  if(Math.abs(startRow-endRow)<1 && ROWS>2)
    endRow = (startRow + rng(1,ROWS-1)) % ROWS;

  /* --- build open grid via DFS --- */
  const open    = Array.from({length:ROWS}, ()=>Array(COLS).fill(false));
  const visited = Array.from({length:ROWS}, ()=>Array(COLS).fill(false));
  open[startRow][startCol]    = true;
  visited[startRow][startCol] = true;
  const path = [[startRow,startCol]];

  function dfs(r,c){
    if(r===endRow && c===endCol) return true;
    const dirs = shuffle([[0,1],[0,-1],[1,0],[-1,0]]);
    for(const [dr,dc] of dirs){
      const nr=r+dr, nc=c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS||visited[nr][nc]) continue;
      visited[nr][nc]=true; open[nr][nc]=true; path.push([nr,nc]);
      if(dfs(nr,nc)) return true;
      path.pop(); open[nr][nc]=false;
    }
    return false;
  }
  dfs(startRow, startCol);

  /* make sure end is open regardless */
  open[endRow][endCol] = true;

  /* widen path randomly */
  for(let i=0;i<40;i++){
    const [pr,pc] = path[rng(0,path.length-1)];
    const [dr,dc] = [[0,1],[0,-1],[1,0],[-1,0]][rng(0,3)];
    const nr=pr+dr, nc=pc+dc;
    if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS) open[nr][nc]=true;
  }
  open[startRow][startCol] = true;
  open[endRow][endCol]     = true;

  /* build walls */
  const walls = [];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(!open[r][c]) continue;
    const x=c*TW, y=r*TH;
    if(r===0       ||!open[r-1][c]) walls.push([x,y,x+TW,y]);
    if(r===ROWS-1  ||!open[r+1][c]) walls.push([x,y+TH,x+TW,y+TH]);
    if(c===0       ||!open[r][c-1]) walls.push([x,y,x,y+TH]);
    if(c===COLS-1  ||!open[r][c+1]) walls.push([x+TW,y,x+TW,y+TH]);
  }

  const ballX = (startCol+0.5)*TW;
  const ballY = (startRow+0.5)*TH;
  const holeX = (endCol+0.5)*TW;
  const holeY = (endRow+0.5)*TH;

  /* safe tiles for hazards/obstacles */
  const safeTiles = [];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(!open[r][c]) continue;
    if(r===startRow&&c===startCol) continue;
    if(r===endRow  &&c===endCol)   continue;
    safeTiles.push([r,c]);
  }
  shuffle(safeTiles);

  /* obstacles */
  const obstacles = [];
  const obsCount = Math.min(rng(2,4), Math.floor(safeTiles.length*0.3));
  for(let i=0;i<obsCount;i++){
    const [tr,tc] = safeTiles[i];
    const cx = (tc+0.5)*TW + rngf(-TW*0.2, TW*0.2);
    const cy = (tr+0.5)*TH + rngf(-TH*0.2, TH*0.2);
    let obs;
    if(Math.random()<0.5){
      obs = {type:'circle', x:cx, y:cy, r:rng(10,16)};
    } else {
      const w=rng(14,26), h=rng(14,26);
      obs = {type:'rect', x:cx-w/2, y:cy-h/2, w, h};
    }
    obs.trees = makeObstacleTrees(obs);
    obstacles.push(obs);
  }

  /* sand traps */
  const sandTraps = [];
  const usedObs = new Set(safeTiles.slice(0,obsCount).map(([r,c])=>r*COLS+c));
  const sandTiles = safeTiles.filter(([r,c])=>!usedObs.has(r*COLS+c));
  shuffle(sandTiles);
  const sandCount = Math.min(rng(1,3), Math.floor(sandTiles.length*0.25));
  for(let i=0;i<sandCount;i++){
    const [tr,tc] = sandTiles[i];
    sandTraps.push({
      x: (tc+0.5)*TW + rngf(-TW*0.15, TW*0.15),
      y: (tr+0.5)*TH + rngf(-TH*0.15, TH*0.15),
      rx: rngf(18,28), ry: rngf(14,22)
    });
  }

  /* water hazards */
  const waterHazards = [];
  const usedSand = new Set(sandTiles.slice(0,sandCount).map(([r,c])=>r*COLS+c));
  const waterTiles = sandTiles.filter(([r,c])=>!usedSand.has(r*COLS+c));
  shuffle(waterTiles);
  const waterCount = Math.min(rng(1,2), Math.floor(waterTiles.length*0.2));
  for(let i=0;i<waterCount;i++){
    const [tr,tc] = waterTiles[i];
    waterHazards.push({
      x: (tc+0.5)*TW + rngf(-TW*0.1, TW*0.1),
      y: (tr+0.5)*TH + rngf(-TH*0.1, TH*0.1),
      rx: rngf(16,24), ry: rngf(12,18)
    });
  }

  /* OOB trees — placed in every closed tile */
  const oobTrees = [];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(open[r][c]) continue;
    const bx=c*TW, by=r*TH;
    const n = rng(5,8);
    for(let i=0;i<n;i++){
      oobTrees.push({
        x: rngf(bx+5, bx+TW-5),
        y: rngf(by+5, by+TH-5),
        r: rngf(4,11)
      });
    }
  }

  const dist = Math.abs(endRow-startRow)+Math.abs(endCol-startCol);
  const par  = dist<=2?2 : dist<=5?3 : dist<=8?4 : 5;

  return {par, ball:[ballX,ballY], hole:[holeX,holeY],
          walls, obstacles, sandTraps, waterHazards, oobTrees,
          open, startRow, startCol, endRow, endCol};
}

/* ---- load hole ---- */
function loadHole(idx){
  currentHole = generateHole(idx);
  ball.x=currentHole.ball[0]; ball.y=currentHole.ball[1];
  ball.vx=0; ball.vy=0;
  shots=0; sunk=false; rolling=false; padActive=false; waterFlash=0;
  padThumb.classList.remove('active');
  padOriginEl.classList.remove('active');
  padHint.classList.remove('hidden');
  document.getElementById('hole-num').textContent  = idx+1;
  document.getElementById('par-num').textContent   = currentHole.par;
  document.getElementById('shot-count').textContent = 0;
  const sc = totalScore;
  document.getElementById('total-score').textContent = sc>0?('+'+sc):sc;
  document.getElementById('next-btn').style.display = 'none';
  hideMsg();
}

/* ---- helpers ---- */
function pointInEllipse(px,py,ex,ey,erx,ery){
  const dx=(px-ex)/erx, dy=(py-ey)/ery;
  return dx*dx+dy*dy<=1;
}

/* ---- physics ---- */
function circleLineReflect(b, walls){
  for(const w of walls){
    const [x1,y1,x2,y2]=w;
    const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy);
    if(len<0.01) continue;
    const t = Math.max(0,Math.min(1,((b.x-x1)*dx+(b.y-y1)*dy)/(len*len)));
    const cx=x1+t*dx, cy=y1+t*dy;
    const ex=b.x-cx, ey=b.y-cy, dist=Math.hypot(ex,ey);
    if(dist<b.r && dist>0){
      const nx=ex/dist, ny=ey/dist;
      b.x=cx+nx*b.r; b.y=cy+ny*b.r;
      const dot=b.vx*nx+b.vy*ny;
      if(dot<0){ b.vx-=2*dot*nx*0.75; b.vy-=2*dot*ny*0.75; }
    }
  }
  if(b.x-b.r<0  ){ b.x=b.r;    if(b.vx<0) b.vx*=-0.75; }
  if(b.x+b.r>GW ){ b.x=GW-b.r; if(b.vx>0) b.vx*=-0.75; }
  if(b.y-b.r<0  ){ b.y=b.r;    if(b.vy<0) b.vy*=-0.75; }
  if(b.y+b.r>GH ){ b.y=GH-b.r; if(b.vy>0) b.vy*=-0.75; }
}

function circleObstacleReflect(b, obstacles){
  for(const obs of obstacles){
    if(obs.type==='circle'){
      const dx=b.x-obs.x, dy=b.y-obs.y;
      const dist=Math.hypot(dx,dy), minD=b.r+obs.r;
      if(dist<minD && dist>0){
        const nx=dx/dist, ny=dy/dist;
        b.x=obs.x+nx*minD; b.y=obs.y+ny*minD;
        const dot=b.vx*nx+b.vy*ny;
        b.vx-=2*dot*nx*0.75; b.vy-=2*dot*ny*0.75;
      }
    } else {
      const nearX=Math.max(obs.x, Math.min(b.x, obs.x+obs.w));
      const nearY=Math.max(obs.y, Math.min(b.y, obs.y+obs.h));
      const dx=b.x-nearX, dy=b.y-nearY, dist=Math.hypot(dx,dy);
      if(dist<b.r && dist>0){
        const nx=dx/dist, ny=dy/dist;
        b.x=nearX+nx*b.r; b.y=nearY+ny*b.r;
        const dot=b.vx*nx+b.vy*ny;
        b.vx-=2*dot*nx*0.75; b.vy-=2*dot*ny*0.75;
      }
    }
  }
}

/* ---- draw ---- */
function drawHole(){
  const h = currentHole;
  waterAnim += 0.05;
  ctx.clearRect(0,0,GW,GH);

  /* OOB background */
  ctx.fillStyle='#0e2e18'; ctx.fillRect(0,0,GW,GH);

  /* OOB trees */
  for(const t of h.oobTrees) drawAerialTree(t.x, t.y, t.r);

  /* Green fairway tiles */
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(!h.open[r][c]) continue;
    const x=c*TW, y=r*TH;
    ctx.fillStyle='#2e8b57'; ctx.fillRect(x,y,TW,TH);
    const tg = ctx.createRadialGradient(x+TW/2,y+TH/2,0, x+TW/2,y+TH/2,TW*0.7);
    tg.addColorStop(0,'rgba(60,180,100,0.18)');
    tg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=tg; ctx.fillRect(x,y,TW,TH);
  }

  /* subtle dot texture */
  ctx.fillStyle='rgba(0,0,0,0.05)';
  for(let i=0;i<GW;i+=14) for(let j=0;j<GH;j+=14){
    const tc=Math.floor(i/TW), tr=Math.floor(j/TH);
    if(tc>=0&&tc<COLS&&tr>=0&&tr<ROWS&&h.open[tr][tc]){
      ctx.beginPath(); ctx.arc(i,j,1,0,Math.PI*2); ctx.fill();
    }
  }

  /* Sand traps — no text */
  for(const s of h.sandTraps){
    const sg = ctx.createRadialGradient(s.x,s.y,0, s.x,s.y,Math.max(s.rx,s.ry)*1.1);
    sg.addColorStop(0,'rgba(210,180,80,0.55)');
    sg.addColorStop(1,'rgba(210,180,80,0)');
    ctx.save(); ctx.scale(1, s.ry/s.rx);
    ctx.beginPath(); ctx.arc(s.x, s.y*(s.rx/s.ry), s.rx*1.1, 0, Math.PI*2);
    ctx.fillStyle=sg; ctx.fill(); ctx.restore();

    ctx.save();
    ctx.beginPath(); ctx.ellipse(s.x,s.y,s.rx,s.ry,0,0,Math.PI*2);
    ctx.fillStyle='#c8a030'; ctx.globalAlpha=0.72; ctx.fill();
    ctx.globalAlpha=1;
    ctx.strokeStyle='rgba(255,220,100,0.3)'; ctx.lineWidth=1;
    for(let k=0;k<3;k++){
      ctx.beginPath();
      ctx.ellipse(s.x,s.y, s.rx*(0.35+k*0.22), s.ry*(0.35+k*0.22), 0,0,Math.PI*2);
      ctx.stroke();
    }
    ctx.restore();
  }

  /* Water hazards — no text */
  for(const w of h.waterHazards){
    ctx.save();
    ctx.beginPath(); ctx.ellipse(w.x,w.y,w.rx,w.ry,0,0,Math.PI*2);
    const wg = ctx.createRadialGradient(w.x-w.rx*0.3,w.y-w.ry*0.3,0, w.x,w.y,Math.max(w.rx,w.ry));
    wg.addColorStop(0,'#5bb8e8'); wg.addColorStop(1,'#1a5c90');
    ctx.fillStyle=wg; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1.2;
    for(let k=0;k<2;k++){
      const off = Math.sin(waterAnim+k*1.5)*3;
      ctx.beginPath();
      ctx.moveTo(w.x-w.rx*0.5+off, w.y-w.ry*0.15+k*w.ry*0.35);
      ctx.bezierCurveTo(
        w.x-w.rx*0.1+off, w.y-w.ry*0.3+k*w.ry*0.35,
        w.x+w.rx*0.1+off, w.y+w.ry*0.0+k*w.ry*0.35,
        w.x+w.rx*0.5+off, w.y-w.ry*0.15+k*w.ry*0.35
      );
      ctx.stroke();
    }
    ctx.restore();
  }

  /* Walls */
  ctx.strokeStyle='#c8a86b'; ctx.lineWidth=5; ctx.lineCap='round';
  for(const w of h.walls){ ctx.beginPath(); ctx.moveTo(w[0],w[1]); ctx.lineTo(w[2],w[3]); ctx.stroke(); }
  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1.5;
  for(const w of h.walls){ ctx.beginPath(); ctx.moveTo(w[0],w[1]); ctx.lineTo(w[2],w[3]); ctx.stroke(); }

  /* Obstacle trees */
  for(const obs of h.obstacles){
    for(const t of obs.trees) drawAerialTree(t.x, t.y, t.r);
  }

  /* Hole cup */
  const [hx,hy] = h.hole;
  ctx.beginPath(); ctx.arc(hx+2,hy+2,HOLE_R,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fill();
  ctx.beginPath(); ctx.arc(hx,hy,HOLE_R,0,Math.PI*2);
  ctx.fillStyle='#111'; ctx.fill();
  ctx.beginPath(); ctx.arc(hx,hy,HOLE_R,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.strokeStyle='#e8e8e8'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(hx,hy); ctx.lineTo(hx,hy-28); ctx.stroke();
  ctx.fillStyle='#e63232';
  ctx.beginPath(); ctx.moveTo(hx,hy-28); ctx.lineTo(hx+14,hy-22); ctx.lineTo(hx,hy-16); ctx.fill();

  /* Start ring */
  if(shots===0 && !rolling){
    ctx.beginPath(); ctx.arc(h.ball[0],h.ball[1],ball.r+8,0,Math.PI*2);
    ctx.strokeStyle='rgba(126,255,160,0.3)'; ctx.lineWidth=1.5; ctx.stroke();
  }

  /* Aim arrow */
  if(padActive && !rolling && !sunk){
    const dist = Math.hypot(padDX,padDY);
    if(dist>4){
      const angle = Math.atan2(-padDY,-padDX);
      const power = Math.min(dist/MAX_PAD_RADIUS*MAX_POWER, MAX_POWER);
      const arrowLen = Math.min(power/MAX_POWER*90+20, 110);
      const nx=Math.cos(angle), ny=Math.sin(angle);
      const ex=ball.x+nx*arrowLen, ey=ball.y+ny*arrowLen;
      ctx.save();
      ctx.setLineDash([4,5]);
      ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(ball.x,ball.y); ctx.lineTo(ball.x+nx*200,ball.y+ny*200); ctx.stroke();
      ctx.setLineDash([]);
      const g = ctx.createLinearGradient(ball.x,ball.y,ex,ey);
      g.addColorStop(0,'rgba(126,255,160,0.95)');
      g.addColorStop(1,'rgba(240,220,60,0.95)');
      ctx.strokeStyle=g; ctx.lineWidth=2.5; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(ball.x,ball.y); ctx.lineTo(ex,ey); ctx.stroke();
      ctx.fillStyle='rgba(240,220,60,0.95)';
      ctx.beginPath();
      ctx.moveTo(ex,ey);
      ctx.lineTo(ex-10*Math.cos(angle-0.4), ey-10*Math.sin(angle-0.4));
      ctx.lineTo(ex-10*Math.cos(angle+0.4), ey-10*Math.sin(angle+0.4));
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  }

  /* Ball */
  if(!sunk){
    ctx.beginPath(); ctx.arc(ball.x+2,ball.y+3,ball.r,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fill();
    const bg = ctx.createRadialGradient(ball.x-3,ball.y-3,1, ball.x,ball.y,ball.r);
    bg.addColorStop(0,'#ffffff'); bg.addColorStop(0.6,'#e8e8e8'); bg.addColorStop(1,'#c0c0c0');
    ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
    ctx.fillStyle=bg; ctx.fill();
    ctx.beginPath(); ctx.arc(ball.x-2,ball.y-2,2.5,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.fill();
  }

  /* Water flash overlay */
  if(waterFlash>0){
    ctx.fillStyle='rgba(80,160,240,'+(waterFlash/15*0.45)+')';
    ctx.fillRect(0,0,GW,GH);
    waterFlash--;
  }
}

/* ---- resize ---- */
function resize(){
  const h1  = document.querySelector('h1');
  const hud = document.getElementById('hud');
  const btnRow = document.getElementById('btn-row');
  const topUI = h1.offsetHeight + hud.offsetHeight + 14;
  const botUI = btnRow.offsetHeight + 14;
  const gap = 8; // gap between game and pad
  const availW = window.innerWidth - 16;
  // Both game and pad are square (GW x GW), stacked vertically with a gap
  // totalH needed = GW*sf + gap + GW*sf = 2*GW*sf + gap
  // availH = window.innerHeight - topUI - botUI - gap
  const availH = window.innerHeight - topUI - botUI - gap;
  // sf = min(availW/GW, availH/(2*GW))
  const sf = Math.min(availW / GW, availH / (2 * GW), 2);
  scale = sf;
  const sz = Math.round(GW * sf);
  canvas.style.transform = 'scale('+sf+')';
  canvas.style.transformOrigin = 'top left';
  const wrap = document.getElementById('game-wrap');
  wrap.style.width  = sz+'px';
  wrap.style.height = sz+'px';
  pad.style.width   = sz+'px';
  pad.style.height  = sz+'px';
}
window.addEventListener('resize', resize);

/* ---- pad controls ---- */
function updatePadThumb(){
  const dist  = Math.hypot(padDX,padDY);
  const cd    = Math.min(dist, MAX_PAD_RADIUS);
  const angle = Math.atan2(padDY,padDX);
  padThumb.style.left  = (padOriginX + Math.cos(angle)*cd)+'px';
  padThumb.style.top   = (padOriginY + Math.sin(angle)*cd)+'px';
  padOriginEl.style.left = padOriginX+'px';
  padOriginEl.style.top  = padOriginY+'px';
}
function padPointerStart(cx,cy){
  if(sunk||rolling) return;
  const r = pad.getBoundingClientRect();
  padOriginX=cx-r.left; padOriginY=cy-r.top;
  padDX=0; padDY=0; padActive=true;
  padThumb.classList.add('active');
  padOriginEl.classList.add('active');
  padHint.classList.add('hidden');
  updatePadThumb();
}
function padPointerMove(cx,cy){
  if(!padActive) return;
  const r = pad.getBoundingClientRect();
  padDX=(cx-r.left)-padOriginX;
  padDY=(cy-r.top)-padOriginY;
  updatePadThumb();
}
function padPointerEnd(){
  if(!padActive||sunk||rolling) return;
  padActive=false;
  padThumb.classList.remove('active');
  padOriginEl.classList.remove('active');
  shoot();
}
pad.addEventListener('mousedown',  e=>{e.preventDefault(); padPointerStart(e.clientX,e.clientY);});
window.addEventListener('mousemove',e=>{if(padActive) padPointerMove(e.clientX,e.clientY);});
window.addEventListener('mouseup',  ()=>{if(padActive) padPointerEnd();});
pad.addEventListener('touchstart', e=>{e.preventDefault(); padPointerStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
window.addEventListener('touchmove',e=>{if(padActive){e.preventDefault(); padPointerMove(e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
window.addEventListener('touchend', e=>{if(padActive){e.preventDefault(); padPointerEnd();}},{passive:false});

function shoot(){
  const dist = Math.hypot(padDX,padDY);
  if(dist<4) return;
  const power = Math.min(dist/MAX_PAD_RADIUS*MAX_POWER, MAX_POWER);
  const angle = Math.atan2(-padDY,-padDX);   /* reversed: drag opposite to shoot */
  ball.vx=Math.cos(angle)*power;
  ball.vy=Math.sin(angle)*power;
  rolling=true; shots++;
  document.getElementById('shot-count').textContent=shots;
  padDX=0; padDY=0;
}

/* ---- game loop ---- */
function tick(){
  if(rolling && currentHole){
    /* move in sub-steps smaller than the ball radius so a fast shot
       can't jump clean over a thin wall segment in a single frame
       (this was letting the ball tunnel out of bounds) */
    const moveDist = Math.hypot(ball.vx, ball.vy);
    const steps = Math.max(1, Math.ceil(moveDist / (ball.r*0.5)));
    const stepVx = ball.vx/steps, stepVy = ball.vy/steps;
    for(let i=0;i<steps;i++){
      ball.x+=stepVx; ball.y+=stepVy;
      circleLineReflect(ball, currentHole.walls);
      circleObstacleReflect(ball, currentHole.obstacles);
    }

    /* friction — sand or normal */
    let friction = FRICTION_NORMAL;
    for(const s of currentHole.sandTraps){
      if(pointInEllipse(ball.x,ball.y, s.x,s.y, s.rx,s.ry)){
        friction=FRICTION_SAND; break;
      }
    }
    ball.vx*=friction; ball.vy*=friction;

    /* water — reset to start */
    for(const w of currentHole.waterHazards){
      if(pointInEllipse(ball.x,ball.y, w.x,w.y, w.rx,w.ry)){
        ball.x=currentHole.ball[0]; ball.y=currentHole.ball[1];
        ball.vx=0; ball.vy=0; rolling=false;
        waterFlash=15; break;
      }
    }

    /* hole check */
    if(rolling){
      const hdx=ball.x-currentHole.hole[0];
      const hdy=ball.y-currentHole.hole[1];
      const hDist=Math.hypot(hdx,hdy);
      const spd=Math.hypot(ball.vx,ball.vy);
      if(hDist<HOLE_R-2){
        if(spd<=SINK_SPEED){
          sunk=true; rolling=false; onSunk();
        } else {
          /* too fast — bounce off rim */
          const nx=hdx/hDist||1, ny=hdy/hDist||0;
          ball.x=currentHole.hole[0]+nx*(HOLE_R+ball.r);
          ball.y=currentHole.hole[1]+ny*(HOLE_R+ball.r);
          const dot=ball.vx*nx+ball.vy*ny;
          if(dot<0){ ball.vx-=2*dot*nx*0.6; ball.vy-=2*dot*ny*0.6; }
        }
      }
    }

    if(rolling && Math.hypot(ball.vx,ball.vy)<0.12){
      ball.vx=0; ball.vy=0; rolling=false;
    }
  }
  if(currentHole) drawHole();
  requestAnimationFrame(tick);
}

/* ---- scoring ---- */
function onSunk(){
  const par=currentHole.par, diff=shots-par;
  totalScore+=diff;
  saveProgress();
  const sc=totalScore;
  document.getElementById('total-score').textContent=sc>0?('+'+sc):sc;
  const label =
    shots===1  ? '&#127942; Hole in One!' :
    diff<=-2   ? '&#129413; Eagle!'       :
    diff===-1  ? '&#128038; Birdie!'      :
    diff===0   ? '&#128079; Par!'         :
    diff===1   ? '&#128517; Bogey'        :
                 '&#128556; +'+diff;
  showMsg(label, shots+' shot'+(shots>1?'s':'')+' &middot; Par '+par);
  setTimeout(()=>{ document.getElementById('next-btn').style.display='inline-block'; }, 800);
}
function showMsg(t,s){
  const el=document.getElementById('msg');
  el.innerHTML=t+'<div class="sub">'+s+'</div>';
  el.classList.add('show');
}
function hideMsg(){
  const el=document.getElementById('msg');
  el.classList.remove('show');
  el.innerHTML='';
}
function advanceHole(){ holeIdx++; hideMsg(); loadHole(holeIdx); saveProgress(); }
document.getElementById('next-btn').addEventListener('click', advanceHole);

/* ---- init: restore or start fresh ---- */
resize();
const saved = loadProgress();
if(saved){ holeIdx=saved.holeIdx; totalScore=saved.totalScore; }
loadHole(holeIdx);
tick();

// ── Cache-busting refresh: ensure the latest deployed version is always loaded ──
// Progress is already in localStorage (unaffected by cache clearing) via saveProgress().
// Guard with sessionStorage so this only runs once per tab session, not on every
// reload it itself triggers.
(function refreshCache() {
  try {
    if (sessionStorage.getItem('gg_cache_refreshed')) return;
    sessionStorage.setItem('gg_cache_refreshed', '1');
  } catch(e) { return; }

  saveProgress();

  const tasks = [];
  if ('caches' in window) {
    tasks.push(caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))));
  }
  if ('serviceWorker' in navigator) {
    tasks.push(navigator.serviceWorker.getRegistrations().then(regs => Promise.all(regs.map(r => r.unregister()))));
  }
  Promise.all(tasks).catch(() => {}).finally(() => location.reload());
})();
</script>
